<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrrunBerri OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f0f6fa;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Subtle background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(41,182,212,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(26,143,168,0.06) 0%, transparent 50%);
  pointer-events: none;
}

.card {
  background: #ffffff;
  border: 1.5px solid #c0d8e8;
  border-radius: 24px;
  padding: 60px 80px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(41,182,212,0.12);
  position: relative;
  z-index: 1;
  min-width: 480px;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.logo-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #29b6d4, #1a8fa8);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  margin: 0 auto 24px;
  box-shadow: 0 8px 24px rgba(41,182,212,0.35);
}

.app-name {
  font-size: 36px;
  font-weight: 700;
  color: #29b6d4;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}

.app-sub {
  font-size: 13px;
  color: #6b8fa3;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
}

.app-company {
  font-size: 12px;
  color: #9bbccc;
  margin-bottom: 40px;
}

/* Connection info box */
.conn-box {
  background: #f0f6fa;
  border: 1.5px solid #c0d8e8;
  border-radius: 12px;
  padding: 16px 24px;
  margin-bottom: 32px;
  text-align: left;
}

.conn-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #1a3a52;
  margin-bottom: 6px;
}
.conn-row:last-child { margin-bottom: 0; }
.conn-label {
  font-weight: 600;
  color: #29b6d4;
  min-width: 80px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.conn-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #0d2233;
  font-weight: 500;
}

/* Status / connecting indicator */
.status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 28px;
}

.spinner {
  width: 20px; height: 20px;
  border: 2.5px solid rgba(41,182,212,0.2);
  border-top-color: #29b6d4;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.status-text {
  font-size: 14px;
  font-weight: 500;
  color: #1a3a52;
}

/* Progress bar */
.progress-track {
  height: 4px;
  background: #e4f1f8;
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 28px;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #29b6d4, #4dd4ec);
  border-radius: 2px;
  animation: progress 5s linear forwards;
}
@keyframes progress { from{width:0} to{width:100%} }

/* Lang switcher */
.langs {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.lang-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  background: #f0f6fa;
  border: 1px solid #c0d8e8;
  color: #6b8fa3;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}
.lang-btn:hover, .lang-btn.active {
  background: #29b6d4;
  color: #fff;
  border-color: #29b6d4;
}

/* Version badge */
.version {
  position: absolute;
  bottom: 20px;
  right: 24px;
  font-size: 11px;
  color: #9bbccc;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo-icon">🖥</div>
  <div class="app-name">UrrunBerri OS</div>
  <div class="app-sub" id="subtitle">Thin Client Linux</div>
  <div class="app-company">Openema SARL</div>

  <!-- Connection info (populated from config) -->
  <div class="conn-box" id="conn-box">
    <div class="conn-row">
      <span class="conn-label" id="lbl-protocol">Protocole</span>
      <span class="conn-value" id="val-protocol">RDP</span>
    </div>
    <div class="conn-row">
      <span class="conn-label" id="lbl-server">Serveur</span>
      <span class="conn-value" id="val-server">192.168.1.10:3389</span>
    </div>
    <div class="conn-row">
      <span class="conn-label" id="lbl-user">Utilisateur</span>
      <span class="conn-value" id="val-user">Administrateur</span>
    </div>
  </div>

  <!-- Status -->
  <div class="status">
    <div class="spinner"></div>
    <div class="status-text" id="status-text">Connexion en cours…</div>
  </div>

  <!-- Progress bar -->
  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>

  <!-- Language switcher -->
  <div class="langs">
    <button class="lang-btn active" onclick="setLang('fr')"><span>🇫🇷</span> FR</button>
    <button class="lang-btn" onclick="setLang('en')"><span>🇬🇧</span> EN</button>
    <button class="lang-btn" onclick="setLang('es')"><span>🇪🇸</span> ES</button>
    <button class="lang-btn" onclick="setLang('eu')"><span>🏴</span> EU</button>
  </div>

  <div class="version">v0.1.0</div>
</div>

<script>
const i18n = {
  fr: {
    subtitle:   'Thin Client Linux',
    protocol:   'Protocole',
    server:     'Serveur',
    user:       'Utilisateur',
    connecting: 'Connexion en cours…',
  },
  en: {
    subtitle:   'Linux Thin Client',
    protocol:   'Protocol',
    server:     'Server',
    user:       'User',
    connecting: 'Connecting…',
  },
  es: {
    subtitle:   'Cliente Ligero Linux',
    protocol:   'Protocolo',
    server:     'Servidor',
    user:       'Usuario',
    connecting: 'Conectando…',
  },
  eu: {
    subtitle:   'Linux Thin Clienta',
    protocol:   'Protokoloa',
    server:     'Zerbitzaria',
    user:       'Erabiltzailea',
    connecting: 'Konektatzen…',
  },
};

let lang = 'fr';

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes(`'${l}'`));
  });
  const t = i18n[l] || i18n.fr;
  document.getElementById('subtitle').textContent     = t.subtitle;
  document.getElementById('lbl-protocol').textContent = t.protocol;
  document.getElementById('lbl-server').textContent   = t.server;
  document.getElementById('lbl-user').textContent     = t.user;
  document.getElementById('status-text').textContent  = t.connecting;
}

// Read URL params to show real config values
const params = new URLSearchParams(window.location.search);
if (params.get('protocol')) document.getElementById('val-protocol').textContent = params.get('protocol').toUpperCase();
if (params.get('host'))     document.getElementById('val-server').textContent   = params.get('host') + ':' + (params.get('port') || '3389');
if (params.get('user'))     document.getElementById('val-user').textContent     = params.get('user');
if (params.get('lang'))     setLang(params.get('lang'));
</script>
</body>
</html>
