# UrrunBerri OS — Configuration
# /etc/urrunberri-os/config.conf
#
# Ce fichier configure le thin client.
# Modifiez-le selon votre infrastructure puis redémarrez.
# Auteur : Mathieu Cadi — Openema SARL

# ── PROTOCOLE ────────────────────────────────────────────────────────────────
# rdp   → Serveur Windows (xfreerdp)
# vnc   → Bureau Linux (tigervnc)
# ssh   → Terminal Linux
# web   → Navigateur kiosk (Firefox)
PROTOCOL=rdp

# ── SERVEUR CIBLE ─────────────────────────────────────────────────────────────
HOST=192.168.1.10
PORT=3389
USERNAME=Administrateur
# PASSWORD=  (laisser vide pour demander au démarrage)
DOMAIN=

# ── AFFICHAGE ─────────────────────────────────────────────────────────────────
RESOLUTION=1920x1080
FULLSCREEN=true
COLOR_DEPTH=32

# ── LANGUE ───────────────────────────────────────────────────────────────────
# fr | en | es | eu
LANG=fr

# ── OPTIONS RDP ───────────────────────────────────────────────────────────────
RDP_CLIPBOARD=true
RDP_SOUND=false
RDP_FONTS=true
RDP_RECONNECT=true

# ── OPTIONS AFFICHAGE ─────────────────────────────────────────────────────────
# Afficher l'écran de démarrage UrrunBerri avant la connexion (true/false)
SHOW_SPLASH=true
# Durée de l'écran de démarrage en secondes
SPLASH_DURATION=5
